name: Deploy to Dreamhost

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run claim linter
        run: npm run check:claims

  deploy:
    needs: lint
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH
        env:
          SSH_KEY: ${{ secrets.DREAMHOST_SSH_KEY_LAPTOP }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H pdx1-shared-a4-03.dreamhost.com >> ~/.ssh/known_hosts 2>/dev/null

      - name: Deploy files via rsync
        run: |
          rsync -avz --delete \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='tailwind.config.js' \
            --exclude='src' \
            --exclude='docs' \
            --exclude='tests' \
            --exclude='scripts' \
            --exclude='.env' \
            --exclude='node_modules' \
            --exclude='server.js' \
            --exclude='package.json' \
            --exclude='package-lock.json' \
            --exclude='CLAUDE.md' \
            -e "ssh -i ~/.ssh/deploy_key" \
            ./ dh_xjct9a@pdx1-shared-a4-03.dreamhost.com:/home/dh_xjct9a/williamtucker.ca/
